<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reader — Beowolff</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --black: #1a1a1a;
  --white: #faf9f6;
  --sun: #f0c040;
  --sun-light: #fef6d8;
  --sun-pale: #fffdf5;
  --pool: #2fa8cc;
  --coral: #e8573a;
  --border: #d4d0c8;
  --muted: #6b6b6b;
  --link: #1a6b8a;
  --code-bg: #f5f4ee;
  --line: #111;
  --sans: 'Space Grotesk', system-ui, sans-serif;
  --serif: 'Crimson Pro', Georgia, serif;
  --mono: 'IBM Plex Mono', monospace;
  --display: 'Instrument Serif', Georgia, serif;
  --sidebar-w: 280px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 17px; }
body { font-family: var(--serif); color: var(--black); background: var(--white); display: flex; min-height: 100vh; }

/* === SIDEBAR === */
nav {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--sun-pale);
  border-right: 3px solid var(--line);
  padding: 0;
  position: fixed; top: 0; left: 0; height: 100vh;
  overflow-y: auto; z-index: 10;
  display: flex; flex-direction: column;
}
nav .nav-header {
  padding: 1.5rem 1.25rem 1rem;
  border-bottom: 3px solid var(--line);
}
nav .back {
  display: inline-block;
  font-family: var(--mono); font-size: 0.65rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); text-decoration: none;
  margin-bottom: 0.75rem;
}
nav .back:hover { color: var(--sun); }
nav h1 {
  font-family: var(--display); font-size: 1.5rem;
  font-weight: 400; line-height: 1.15;
  margin-bottom: 0.2rem;
}
nav .subtitle {
  font-family: var(--mono); font-size: 0.65rem;
  color: var(--muted); letter-spacing: 0.06em;
  text-transform: uppercase;
}
nav .accent-bar { height: 5px; background: var(--sun); }
nav .nav-body {
  padding: 1rem 1.25rem;
  flex: 1; overflow-y: auto;
}
nav .nav-section {
  font-family: var(--mono);
  font-size: 0.6rem; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--muted);
  margin-top: 1.25rem; margin-bottom: 0.4rem;
  padding-left: 0.5rem;
}
nav .nav-section:first-child { margin-top: 0; }
nav ol { list-style: none; }
nav ol li { margin-bottom: 0.1rem; }
nav ol li a {
  display: block; padding: 0.35rem 0.5rem;
  font-family: var(--sans); font-size: 0.8rem; font-weight: 500;
  color: var(--black); text-decoration: none;
  border-radius: 4px; line-height: 1.35;
  transition: background 0.15s;
}
nav ol li a:hover { background: rgba(240,192,64,0.2); }
nav ol li a.active { background: var(--sun); color: var(--black); }
nav .nav-footer {
  padding: 1rem 1.25rem;
  border-top: 1px solid var(--border);
  font-family: var(--mono); font-size: 0.65rem;
  color: var(--muted); line-height: 1.6;
}
nav .nav-footer a { color: var(--link); text-decoration: none; }
nav .nav-footer a:hover { color: var(--sun); }

/* === CONTENT === */
main {
  margin-left: var(--sidebar-w); flex: 1;
  max-width: 52rem; padding: 3rem 3.5rem 6rem;
}
main h1 {
  font-family: var(--display); font-size: 2.2rem;
  font-weight: 400; margin-bottom: 0.5rem;
  line-height: 1.15; color: var(--black);
}
main h2 {
  font-family: var(--display); font-size: 1.6rem;
  font-weight: 400; margin-top: 2.5rem;
  margin-bottom: 0.75rem; line-height: 1.25;
}
main h3 {
  font-family: var(--sans); font-size: 1.05rem;
  font-weight: 600; margin-top: 2rem; margin-bottom: 0.5rem;
}
main h4 {
  font-family: var(--sans); font-size: 0.95rem;
  font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.4rem;
}
main p { margin-bottom: 1rem; line-height: 1.75; font-weight: 300; }
main strong { font-weight: 600; }
main ul, main ol { margin-bottom: 1rem; padding-left: 1.5rem; }
main li { margin-bottom: 0.35rem; line-height: 1.65; font-weight: 300; }
main blockquote {
  border-left: 4px solid var(--sun);
  padding: 0.75rem 1.25rem; margin: 1.25rem 0;
  background: var(--sun-pale);
}
main blockquote p { margin-bottom: 0.5rem; }
main blockquote p:last-child { margin-bottom: 0; }
main code {
  font-family: var(--mono); font-size: 0.85em;
  background: var(--code-bg); padding: 0.15em 0.35em;
  border-radius: 3px;
}
main pre {
  background: var(--code-bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 1rem 1.25rem;
  overflow-x: auto; margin-bottom: 1.25rem; line-height: 1.5;
}
main pre code { background: none; padding: 0; font-size: 0.82rem; }
main a { color: var(--link); }
main a:hover { color: var(--pool); }
main table { border-collapse: collapse; width: 100%; margin-bottom: 1.25rem; font-size: 0.9rem; }
main th, main td {
  border: 1px solid var(--border); padding: 0.5rem 0.75rem;
  text-align: left; line-height: 1.5;
}
main th { background: var(--code-bg); font-family: var(--sans); font-weight: 600; font-size: 0.82rem; }
main hr { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }
main .chapter-nav {
  display: flex; justify-content: space-between;
  margin-top: 3rem; padding-top: 1.5rem;
  border-top: 3px solid var(--line);
  font-size: 0.85rem;
}
main .chapter-nav a {
  color: var(--link); text-decoration: none;
  font-family: var(--sans); font-weight: 500;
}
main .chapter-nav a:hover { color: var(--sun); }
.katex-display { margin: 1.25rem 0; overflow-x: auto; }

@media print {
  nav { display: none; }
  main { margin-left: 0; max-width: 100%; padding: 1rem; }
  main .chapter-nav { display: none; }
  body { font-size: 11pt; }
}
@media (max-width: 800px) {
  nav { position: static; width: 100%; min-width: 0; height: auto; border-right: none; border-bottom: 3px solid var(--line); }
  nav .nav-body { max-height: 50vh; }
  main { margin-left: 0; padding: 1.5rem; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-header">
    <a class="back" href="../">&larr; Beowolff</a>
    <h1>Reader</h1>
    <div class="subtitle">Beowolff-Embed Program</div>
  </div>
  <div class="accent-bar"></div>
  <div class="nav-body" id="toc"></div>
  <div class="nav-footer">
    <a href="#" onclick="printAll(); return false;">Export PDF</a><br>
    Zachary F. Mainen, 2026
  </div>
</nav>

<main id="content">
  <p style="color:var(--muted); margin-top: 4rem; text-align:center; font-family: var(--sans);">Select a chapter from the sidebar.</p>
</main>

<script>
const entries = [
  { section: 'Chapters' },
  { file: 'chapters/01-reading-map.md',          title: 'Reading Map',                         key: '1' },
  { file: 'chapters/02-foundations.md',           title: 'Embeddings, Geometry, and Similarity', key: '2' },
  { file: 'chapters/03-self-supervised-vision.md', title: 'Self-Supervised Vision: DINOv3',      key: '3' },
  { file: 'chapters/04-contrastive-learning.md',  title: 'Contrastive Learning',                key: '4' },
  { file: 'chapters/05-multi-modal-alignment.md', title: 'Multi-Modal Alignment',               key: '5' },
  { file: 'chapters/06-recommendation-systems.md', title: 'Recommendation Systems',             key: '6' },
  { file: 'chapters/07-sequence-modelling.md',    title: 'Sequence Modelling for User Behaviour', key: '7' },
  { file: 'chapters/08-scaling.md',               title: 'Scaling Realities',                   key: '8' },
  { file: 'chapters/09-attribution.md',           title: 'Attribution: From Theory to Practice', key: '9' },
  { file: 'chapters/10-privacy.md',               title: 'Privacy-Preserving ML',               key: '10' },
  { file: 'chapters/11-production-ml.md',         title: 'Production ML Operations',            key: '11' },
  { file: 'chapters/12-threat-models.md',         title: 'Threat Models',                       key: '12' },
  { file: 'chapters/13-risks.md',                 title: 'Where the Proposal Could Be Wrong',   key: '13' },
];

const chapters = entries.filter(e => e.file);
const toc = document.getElementById('toc');
const content = document.getElementById('content');
let currentIdx = -1;

let chapterIdx = 0;
entries.forEach(e => {
  if (e.section) {
    const div = document.createElement('div');
    div.className = 'nav-section';
    div.textContent = e.section;
    toc.appendChild(div);
    const ol = document.createElement('ol');
    toc.appendChild(ol);
  } else {
    const lists = toc.querySelectorAll('ol');
    const ol = lists[lists.length - 1];
    const li = document.createElement('li');
    const a = document.createElement('a');
    const idx = chapterIdx;
    a.href = '#' + e.key;
    a.textContent = e.key + '. ' + e.title;
    a.dataset.idx = idx;
    a.onclick = (ev) => { ev.preventDefault(); loadChapter(idx); };
    li.appendChild(a);
    ol.appendChild(li);
    chapterIdx++;
  }
});

function renderMath(html) {
  html = html.replace(/\$\$([\s\S]*?)\$\$/g, (_, tex) => {
    try { return katex.renderToString(tex.trim(), { displayMode: true }); } catch(e) { return '$$' + tex + '$$'; }
  });
  html = html.replace(/(?<!\$)\$(?!\$)([^\n$]+?)\$(?!\$)/g, (_, tex) => {
    try { return katex.renderToString(tex.trim(), { displayMode: false }); } catch(e) { return '$' + tex + '$'; }
  });
  return html;
}

function slugify(text) {
  return text.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
}

function addAnchors(html) {
  return html.replace(/<(h[1-4])>(.*?)<\/\1>/g, (m, tag, text) => {
    const id = slugify(text.replace(/<[^>]+>/g, ''));
    return `<${tag} id="${id}">${text}</${tag}>`;
  });
}

async function loadChapter(idx, scrollTo) {
  currentIdx = idx;
  const ch = chapters[idx];
  toc.querySelectorAll('a').forEach(a => a.classList.toggle('active', parseInt(a.dataset.idx) === idx));
  try {
    const resp = await fetch(ch.file);
    if (!resp.ok) { content.innerHTML = `<h1>${ch.title}</h1><p style="color:var(--muted);">Chapter not yet available.</p>`; return; }
    const md = await resp.text();
    let html = marked.parse(md);
    html = renderMath(html);
    html = addAnchors(html);
    const prev = idx > 0 ? `<a href="#" onclick="loadChapter(${idx-1}); return false;">&larr; ${chapters[idx-1].title}</a>` : '<span></span>';
    const next = idx < chapters.length - 1 ? `<a href="#" onclick="loadChapter(${idx+1}); return false;">${chapters[idx+1].title} &rarr;</a>` : '<span></span>';
    html += `<div class="chapter-nav">${prev}${next}</div>`;
    content.innerHTML = html;
    if (scrollTo) { const el = document.getElementById(scrollTo); if (el) { el.scrollIntoView({ behavior: 'smooth' }); return; } }
    window.scrollTo(0, 0);
    history.pushState(null, '', '#' + ch.key);
  } catch(e) { content.innerHTML = `<h1>${ch.title}</h1><p style="color:var(--muted);">Error loading.</p>`; }
}

async function printAll() {
  let allHtml = '<h1 style="text-align:center; margin-bottom:2rem; font-family: var(--display);">Beowolff-Embed Reader</h1>';
  for (const ch of chapters) {
    try {
      const resp = await fetch(ch.file);
      if (resp.ok) {
        const md = await resp.text();
        let html = marked.parse(md); html = renderMath(html); html = addAnchors(html);
        allHtml += '<div style="page-break-before:always;">' + html + '</div>';
      }
    } catch(e) {}
  }
  content.innerHTML = allHtml;
  setTimeout(() => window.print(), 300);
}

content.addEventListener('click', (e) => {
  const a = e.target.closest('a');
  if (!a) return;
  const href = a.getAttribute('href');
  if (!href || !href.startsWith('#')) return;
  const parts = href.slice(1).split('/');
  const key = parts[0]; const section = parts[1] || null;
  const idx = chapters.findIndex(c => c.key === key);
  if (idx >= 0) { e.preventDefault(); loadChapter(idx, section); }
});

function navigateFromHash() {
  const h = window.location.hash.slice(1);
  if (!h) return;
  const parts = h.split('/');
  const idx = chapters.findIndex(c => c.key === parts[0]);
  if (idx >= 0 && idx !== currentIdx) loadChapter(idx, parts[1]);
}
navigateFromHash();
window.addEventListener('hashchange', navigateFromHash);
</script>
</body>
</html>
