<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Beowolff — Art Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
#canvas { width: 100vw; height: 100vh; display: block; cursor: grab; }
#canvas:active { cursor: grabbing; }

#info {
  position: fixed; top: 16px; left: 16px; z-index: 10;
  background: rgba(12,16,26,0.85); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; padding: 12px 16px; max-width: 280px;
  backdrop-filter: blur(8px); font-size: 13px; line-height: 1.5;
}
#info h1 { font-size: 16px; font-weight: 600; margin-bottom: 4px; color: #fff; }
#info .count { color: #888; font-size: 12px; }

/* Hover tooltip */
#tooltip {
  position: fixed; z-index: 20; pointer-events: none; display: none;
  background: rgba(12,16,26,0.95); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px; overflow: hidden; max-width: 260px;
  backdrop-filter: blur(12px); box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#tooltip img { width: 100%; max-height: 180px; object-fit: contain; background: #111; display: block; }
#tooltip .meta { padding: 8px 12px; }
#tooltip .title { font-size: 13px; font-weight: 600; color: #fff; }
#tooltip .artist { font-size: 12px; color: #aaa; margin-top: 2px; }
#tooltip .extra { font-size: 11px; color: #666; margin-top: 2px; }

/* Pinned detail panel */
#detail {
  position: fixed; bottom: 20px; right: 20px; z-index: 15;
  background: rgba(12,16,26,0.95); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px; padding: 0; max-width: 320px; display: none;
  backdrop-filter: blur(12px); overflow: hidden;
}
#detail img { width: 100%; max-height: 280px; object-fit: contain; background: #111; }
#detail .meta { padding: 12px 16px; }
#detail .title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 4px; }
#detail .artist { font-size: 13px; color: #aaa; }
#detail .extra { font-size: 12px; color: #666; margin-top: 4px; }
#detail .close { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); border: none; color: #fff; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 14px; line-height: 24px; text-align: center; }

#landmarks { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
.landmark { position: absolute; font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 600; letter-spacing: 0.5px; text-shadow: 0 1px 6px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.7); white-space: nowrap; transform: translate(-50%, -50%); transition: opacity 0.3s; }

/* Controls: top-right */
#controls {
  position: fixed; top: 16px; right: 16px; z-index: 10;
  display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
}
#filters { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
#projection-toggle { display: flex; gap: 4px; }

.ctrl-btn {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  color: #ccc; border-radius: 16px; padding: 4px 12px; font-size: 12px;
  cursor: pointer; transition: all 0.2s; user-select: none;
}
.ctrl-btn.active { background: rgba(255,255,255,0.2); color: #fff; border-color: rgba(255,255,255,0.3); }
.ctrl-btn .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

#loading {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20;
  text-align: center; font-size: 14px; color: #888;
}
#loading .bar { width: 200px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 12px; }
#loading .fill { height: 100%; background: #4a9eff; border-radius: 2px; transition: width 0.3s; width: 0%; }
</style>
</head>
<body>

<div id="loading">
  <div>Loading art collection…</div>
  <div class="bar"><div class="fill" id="load-fill"></div></div>
</div>

<div id="info">
  <h1>Beowolff Art Explorer</h1>
  <div class="count" id="count"></div>
</div>

<div id="controls">
  <div id="projection-toggle"></div>
  <div id="filters"></div>
</div>

<div id="landmarks"></div>
<canvas id="canvas"></canvas>

<div id="tooltip">
  <img id="tip-img" src="">
  <div class="meta">
    <div class="title" id="tip-title"></div>
    <div class="artist" id="tip-artist"></div>
    <div class="extra" id="tip-extra"></div>
  </div>
</div>

<div id="detail">
  <button class="close" onclick="closeDetail()">&times;</button>
  <img id="detail-img" src="">
  <div class="meta">
    <div class="title" id="detail-title"></div>
    <div class="artist" id="detail-artist"></div>
    <div class="extra" id="detail-extra"></div>
  </div>
</div>

<script>
const SOS = "https://sos-de-muc-1.exo.io/beowolff-corpora";
const BASE = `${SOS}/visualiser/v1`;

const TYPE_COLORS = {
  paintings: [230, 77, 77],
  prints: [77, 153, 255],
  photographs: [51, 230, 128],
  drawings: [255, 204, 51],
  sculpture: [230, 77, 179],
  miniatures: [255, 128, 51],
  pastels: [153, 102, 255],
};
const TYPE_CSS = {
  paintings: "#e64d4d", prints: "#4d99ff", photographs: "#33e680",
  drawings: "#ffcc33", sculpture: "#e64dB3", miniatures: "#ff8033", pastels: "#9966ff",
};

let coordsSigLIP = null;   // Float32Array, N*2
let coordsIigaya = null;   // Float32Array, N*2 (loaded on demand)
let coords = null;          // active coords
let meta = [];
let landmarks = [];
let manifest = null;
let N = 0;
let activeProjection = "siglip";

// View state
let cx = 0, cy = 0, zoom = 1;
let dragging = false, dragX = 0, dragY = 0;
let activeTypes = new Set();
let hoveredIdx = -1;
let pinnedIdx = -1;

// Spatial index for hover
let gridCells = {};
const GRID_SIZE = 50; // pixels

// Canvas
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", () => { resize(); draw(); });
resize();

// Data loading
async function load() {
  const fill = document.getElementById("load-fill");
  fill.style.width = "10%";

  const mResp = await fetch(`${BASE}/manifest.json`);
  manifest = await mResp.json();
  N = manifest.total;
  landmarks = manifest.landmarks || [];
  fill.style.width = "20%";

  // Load SigLIP coords
  const cResp = await fetch(`${BASE}/coords.bin`);
  coordsSigLIP = new Float32Array(await cResp.arrayBuffer());
  coords = coordsSigLIP;
  fill.style.width = "40%";

  centerView();

  // Load metadata chunks
  const chunks = manifest.chunks || [];
  for (let i = 0; i < chunks.length; i++) {
    const resp = await fetch(`${BASE}/${chunks[i]}`);
    meta.push(...await resp.json());
    fill.style.width = (40 + 50 * (i + 1) / chunks.length) + "%";
  }

  fill.style.width = "95%";

  activeTypes = new Set(Object.keys(manifest.types || manifest.corpora));
  setupFilters();
  setupProjectionToggle();
  setupLandmarks();

  document.getElementById("count").textContent = `${N.toLocaleString()} works`;
  document.getElementById("loading").style.display = "none";

  draw();

  // Load Iigaya coords in background
  loadIigayaCoords();
}

async function loadIigayaCoords() {
  try {
    const resp = await fetch(`${BASE}/coords_iigaya.bin`);
    if (resp.ok) {
      coordsIigaya = new Float32Array(await resp.arrayBuffer());
      // Enable the toggle button
      document.getElementById("btn-iigaya").style.opacity = "1";
    }
  } catch(e) { /* not available yet */ }
}

function centerView() {
  const b = manifest.bounds;
  cx = (b.xmin + b.xmax) / 2;
  cy = (b.ymin + b.ymax) / 2;
  const span = Math.max(b.xmax - b.xmin, b.ymax - b.ymin);
  zoom = Math.min(W, H) / span * 0.85;
}

function setupFilters() {
  const container = document.getElementById("filters");
  const types = manifest.types || manifest.corpora;
  // Sort by count descending
  const sorted = Object.entries(types).sort((a,b) => b[1] - a[1]);
  for (const [tp, count] of sorted) {
    const btn = document.createElement("div");
    btn.className = "ctrl-btn active";
    btn.dataset.type = tp;
    const k = count >= 1000 ? `${(count/1000).toFixed(0)}k` : count;
    btn.innerHTML = `<span class="dot" style="background:${TYPE_CSS[tp] || '#888'}"></span>${tp} (${k})`;
    btn.onclick = () => {
      if (activeTypes.has(tp)) { activeTypes.delete(tp); btn.classList.remove("active"); }
      else { activeTypes.add(tp); btn.classList.add("active"); }
      draw();
    };
    container.appendChild(btn);
  }
}

function setupProjectionToggle() {
  const container = document.getElementById("projection-toggle");
  const btnS = document.createElement("div");
  btnS.className = "ctrl-btn active";
  btnS.id = "btn-siglip";
  btnS.textContent = "Semantic (SigLIP)";
  btnS.onclick = () => switchProjection("siglip");

  const btnI = document.createElement("div");
  btnI.className = "ctrl-btn";
  btnI.id = "btn-iigaya";
  btnI.textContent = "Aesthetic (Iigaya)";
  btnI.style.opacity = coordsIigaya ? "1" : "0.4";
  btnI.onclick = () => switchProjection("iigaya");

  container.appendChild(btnS);
  container.appendChild(btnI);
}

function switchProjection(proj) {
  if (proj === "iigaya" && !coordsIigaya) return;
  activeProjection = proj;
  coords = proj === "siglip" ? coordsSigLIP : coordsIigaya;

  document.getElementById("btn-siglip").classList.toggle("active", proj === "siglip");
  document.getElementById("btn-iigaya").classList.toggle("active", proj === "iigaya");

  // Recompute bounds and center
  let xmin=Infinity, xmax=-Infinity, ymin=Infinity, ymax=-Infinity;
  for (let i = 0; i < N; i++) {
    const x = coords[i*2], y = coords[i*2+1];
    if (x < xmin) xmin = x; if (x > xmax) xmax = x;
    if (y < ymin) ymin = y; if (y > ymax) ymax = y;
  }
  manifest.bounds = {xmin, xmax, ymin, ymax};
  centerView();
  draw();
}

function setupLandmarks() {
  const container = document.getElementById("landmarks");
  container.innerHTML = "";
  for (const lm of landmarks) {
    if (lm.count < 3000) continue;
    const el = document.createElement("div");
    el.className = "landmark";
    let label = lm.label.replace(/^prints\s*--\s*/i, "").replace(/^photographs\s*--\s*/i, "");
    el.textContent = label || "Cluster " + lm.id;
    el.dataset.x = lm.x;
    el.dataset.y = lm.y;
    container.appendChild(el);
  }
}

function updateLandmarks() {
  const els = document.querySelectorAll(".landmark");
  for (const el of els) {
    const lx = parseFloat(el.dataset.x);
    const ly = parseFloat(el.dataset.y);
    const sx = (lx - cx) * zoom + W / 2;
    const sy = (ly - cy) * -zoom + H / 2;
    el.style.left = sx + "px";
    el.style.top = sy + "px";
    el.style.opacity = zoom < 80 ? Math.max(0, 1 - zoom / 80) * 0.7 : 0;
  }
}

// Find nearest point to screen position
function findNearest(mx, my, threshold) {
  let closest = -1, closestDist = threshold * threshold;
  for (let i = 0; i < N; i++) {
    const tp = meta[i]?.tp || meta[i]?.c;
    if (!activeTypes.has(tp)) continue;
    const sx = (coords[i*2] - cx) * zoom + W/2;
    const sy = (coords[i*2+1] - cy) * -zoom + H/2;
    const dx = sx - mx, dy = sy - my;
    const d2 = dx*dx + dy*dy;
    if (d2 < closestDist) { closest = i; closestDist = d2; }
  }
  return closest;
}

// Rendering
function draw() {
  ctx.clearRect(0, 0, W, H);
  if (!coords) return;

  const pointSize = Math.max(0.8, Math.min(5, 2 * Math.sqrt(zoom / 10)));

  for (let i = 0; i < N; i++) {
    const tp = meta[i]?.tp || meta[i]?.c;
    if (!activeTypes.has(tp)) continue;

    const x = coords[i * 2];
    const y = coords[i * 2 + 1];
    const sx = (x - cx) * zoom + W / 2;
    const sy = (y - cy) * -zoom + H / 2;

    if (sx < -10 || sx > W + 10 || sy < -10 || sy > H + 10) continue;

    const col = TYPE_COLORS[tp] || [128, 128, 128];
    const isHovered = i === hoveredIdx;
    const isPinned = i === pinnedIdx;
    const alpha = isHovered || isPinned ? 1.0 : Math.min(0.85, 0.25 + zoom / 50);
    const size = isHovered || isPinned ? pointSize * 2.5 : pointSize;

    if (isHovered || isPinned) {
      ctx.fillStyle = `rgba(255,255,255,0.9)`;
      ctx.beginPath();
      ctx.arc(sx, sy, size + 2, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},${alpha})`;
    ctx.beginPath();
    ctx.arc(sx, sy, size / 2, 0, Math.PI * 2);
    ctx.fill();
  }

  updateLandmarks();
}

// Hover tooltip
const tooltip = document.getElementById("tooltip");
const tipImg = document.getElementById("tip-img");
const tipTitle = document.getElementById("tip-title");
const tipArtist = document.getElementById("tip-artist");
const tipExtra = document.getElementById("tip-extra");
let tipImgLoading = "";

function showTooltip(i, mx, my) {
  const m = meta[i];
  tipTitle.textContent = m.t || "Untitled";
  tipArtist.textContent = m.a || "";
  tipExtra.textContent = [m.d, m.m, m.c].filter(Boolean).join(" · ");

  if (m.ik && m.ik.startsWith("http") && m.ik !== tipImgLoading) {
    tipImgLoading = m.ik;
    tipImg.src = m.ik;
    tipImg.style.display = "block";
  } else if (!m.ik || !m.ik.startsWith("http")) {
    tipImg.style.display = "none";
  }

  // Position: offset from cursor, keep on screen
  let tx = mx + 16, ty = my + 16;
  if (tx + 260 > W) tx = mx - 276;
  if (ty + 250 > H) ty = my - 260;
  tooltip.style.left = tx + "px";
  tooltip.style.top = ty + "px";
  tooltip.style.display = "block";
}

function hideTooltip() {
  tooltip.style.display = "none";
  tipImgLoading = "";
}

// Pinned detail
function showDetail(i) {
  const m = meta[i];
  const img = document.getElementById("detail-img");
  const title = document.getElementById("detail-title");
  const artist = document.getElementById("detail-artist");
  const extra = document.getElementById("detail-extra");

  if (m.ik && m.ik.startsWith("http")) {
    img.src = m.ik.replace("!256,256", "!512,512");
    img.style.display = "block";
  } else {
    img.style.display = "none";
  }
  title.textContent = m.t || "Untitled";
  artist.textContent = m.a || "";
  extra.textContent = [m.d, m.m, m.c].filter(Boolean).join(" · ");
  document.getElementById("detail").style.display = "block";
  pinnedIdx = i;
  draw();
}

function closeDetail() {
  document.getElementById("detail").style.display = "none";
  pinnedIdx = -1;
  draw();
}

// Mouse interaction
canvas.addEventListener("mousedown", (e) => {
  dragging = true; dragX = e.clientX; dragY = e.clientY;
});

let dragMoved = false;
window.addEventListener("mousemove", (e) => {
  if (dragging) {
    const dx = e.clientX - dragX, dy = e.clientY - dragY;
    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) dragMoved = true;
    cx -= dx / zoom; cy += dy / zoom;
    dragX = e.clientX; dragY = e.clientY;
    hideTooltip();
    draw();
    return;
  }

  // Hover
  if (!coords || !meta.length) return;
  const idx = findNearest(e.clientX, e.clientY, 12);
  if (idx !== hoveredIdx) {
    hoveredIdx = idx;
    if (idx >= 0) {
      showTooltip(idx, e.clientX, e.clientY);
    } else {
      hideTooltip();
    }
    draw();
  } else if (idx >= 0) {
    // Update tooltip position
    let tx = e.clientX + 16, ty = e.clientY + 16;
    if (tx + 260 > W) tx = e.clientX - 276;
    if (ty + 250 > H) ty = e.clientY - 260;
    tooltip.style.left = tx + "px";
    tooltip.style.top = ty + "px";
  }
});

window.addEventListener("mouseup", (e) => {
  if (!dragMoved && hoveredIdx >= 0) {
    showDetail(hoveredIdx);
  } else if (!dragMoved) {
    closeDetail();
  }
  dragging = false;
  dragMoved = false;
});

canvas.addEventListener("wheel", (e) => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.85 : 1.18;
  // Zoom toward cursor
  const mx = e.clientX, my = e.clientY;
  const wx = (mx - W/2) / zoom + cx;
  const wy = -(my - H/2) / zoom + cy;
  zoom *= factor;
  cx = wx - (mx - W/2) / zoom;
  cy = wy + (my - H/2) / zoom;
  draw();
}, { passive: false });

// Touch support
let lastTouchDist = 0;
canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  if (e.touches.length === 1) {
    dragging = true; dragMoved = false;
    dragX = e.touches[0].clientX; dragY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: false });

canvas.addEventListener("touchmove", (e) => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    const dx = e.touches[0].clientX - dragX, dy = e.touches[0].clientY - dragY;
    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) dragMoved = true;
    cx -= dx / zoom; cy += dy / zoom;
    dragX = e.touches[0].clientX; dragY = e.touches[0].clientY;
    draw();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    if (lastTouchDist > 0) { zoom *= dist / lastTouchDist; draw(); }
    lastTouchDist = dist;
  }
}, { passive: false });

canvas.addEventListener("touchend", (e) => {
  if (!dragMoved && e.changedTouches.length === 1) {
    const t = e.changedTouches[0];
    const idx = findNearest(t.clientX, t.clientY, 20);
    if (idx >= 0) showDetail(idx);
    else closeDetail();
  }
  dragging = false; dragMoved = false; lastTouchDist = 0;
});

// Keyboard
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeDetail();
});

load();
</script>
</body>
</html>
