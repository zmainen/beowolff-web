<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { margin: 0; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 0; }
svg { font-family: -apple-system, 'Helvetica Neue', sans-serif; width: 100%; height: 100%; }
.title { font-size: 16px; font-weight: 600; fill: #1a1a1a; }
.subtitle { font-size: 11px; fill: #777; }
.section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
.box-label { font-size: 11px; font-weight: 600; fill: #1a1a1a; }
.box-sub { font-size: 9px; fill: #555; font-style: italic; }
.dim { font-size: 8.5px; fill: #777; font-family: 'SF Mono', 'Menlo', monospace; }
.cite { font-size: 9px; fill: #999; font-style: italic; }
.row-label { font-size: 9px; fill: #999; text-transform: uppercase; letter-spacing: 0.06em; }
</style>
</head>
<body>
<svg viewBox="0 10 900 365" preserveAspectRatio="xMidYMid meet">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="none" stroke="#ccc" stroke-width="1"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06"/>
    </filter>
  </defs>

  <text x="450" y="36" text-anchor="middle" class="subtitle">Each layer of the network corresponds to a stage of visual processing in the brain</text>

  <!-- Row labels -->
  <text x="68" y="92" text-anchor="end" class="row-label">CNN</text>
  <text x="68" y="105" text-anchor="end" class="row-label">Layer</text>
  <text x="68" y="200" text-anchor="end" class="row-label">Brain</text>
  <text x="68" y="213" text-anchor="end" class="row-label">Area</text>
  <text x="68" y="282" text-anchor="end" class="row-label">What it</text>
  <text x="68" y="295" text-anchor="end" class="row-label">sees</text>

  <!-- ═══ COLUMN 1: Early ═══ -->
  <!-- CNN box -->
  <rect x="80" y="76" width="150" height="44" rx="6" fill="#f0f7fb" stroke="#c4dfe9" stroke-width="1" filter="url(#shadow)"/>
  <text x="155" y="97" text-anchor="middle" class="box-label">Layers 1–3</text>
  <text x="155" y="111" text-anchor="middle" class="dim">64–256 channels</text>

  <!-- Dotted connection -->
  <line x1="155" y1="120" x2="155" y2="185" stroke="#3a8fb7" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Brain box -->
  <rect x="80" y="185" width="150" height="44" rx="6" fill="#fff8f0" stroke="#e8d4b8" stroke-width="1" filter="url(#shadow)"/>
  <text x="155" y="206" text-anchor="middle" class="box-label">V1 / V2</text>
  <text x="155" y="220" text-anchor="middle" class="box-sub">primary visual cortex</text>

  <!-- What it sees -->
  <text x="155" y="260" text-anchor="middle" style="font-size:11px; font-weight:600; fill:#1a1a1a;">Edges</text>
  <text x="155" y="275" text-anchor="middle" class="box-sub">Oriented gradients</text>
  <text x="155" y="288" text-anchor="middle" class="box-sub">Color boundaries</text>

  <!-- ═══ COLUMN 2: Mid-early ═══ -->
  <rect x="260" y="76" width="150" height="44" rx="6" fill="#e4f0f7" stroke="#b0d4e4" stroke-width="1" filter="url(#shadow)"/>
  <text x="335" y="97" text-anchor="middle" class="box-label">Layers 4–8</text>
  <text x="335" y="111" text-anchor="middle" class="dim">256–512 channels</text>

  <line x1="335" y1="120" x2="335" y2="185" stroke="#3a8fb7" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <rect x="260" y="185" width="150" height="44" rx="6" fill="#fff8f0" stroke="#e8d4b8" stroke-width="1" filter="url(#shadow)"/>
  <text x="335" y="206" text-anchor="middle" class="box-label">V4</text>
  <text x="335" y="220" text-anchor="middle" class="box-sub">shape & texture area</text>

  <text x="335" y="260" text-anchor="middle" style="font-size:11px; font-weight:600; fill:#1a1a1a;">Textures</text>
  <text x="335" y="275" text-anchor="middle" class="box-sub">Brushwork, patterns</text>
  <text x="335" y="288" text-anchor="middle" class="box-sub">Surface properties</text>

  <!-- ═══ COLUMN 3: Mid-deep ═══ -->
  <rect x="440" y="76" width="150" height="44" rx="6" fill="#d4e6f0" stroke="#98c4d8" stroke-width="1" filter="url(#shadow)"/>
  <text x="515" y="97" text-anchor="middle" class="box-label">Layers 9–12</text>
  <text x="515" y="111" text-anchor="middle" class="dim">512 channels</text>

  <line x1="515" y1="120" x2="515" y2="185" stroke="#3a8fb7" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <rect x="440" y="185" width="150" height="44" rx="6" fill="#fff8f0" stroke="#e8d4b8" stroke-width="1" filter="url(#shadow)"/>
  <text x="515" y="206" text-anchor="middle" class="box-label">IT Cortex</text>
  <text x="515" y="220" text-anchor="middle" class="box-sub">inferotemporal cortex</text>

  <text x="515" y="260" text-anchor="middle" style="font-size:11px; font-weight:600; fill:#1a1a1a;">Objects</text>
  <text x="515" y="275" text-anchor="middle" class="box-sub">Parts, faces, scenes</text>
  <text x="515" y="288" text-anchor="middle" class="box-sub">Compositional structure</text>

  <!-- ═══ COLUMN 4: Deep ═══ -->
  <rect x="620" y="76" width="150" height="44" rx="6" fill="#c0d8e8" stroke="#80b4cc" stroke-width="1" filter="url(#shadow)"/>
  <text x="695" y="97" text-anchor="middle" class="box-label">Layers 13+</text>
  <text x="695" y="111" text-anchor="middle" class="dim">512 channels</text>

  <line x1="695" y1="120" x2="695" y2="185" stroke="#3a8fb7" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <rect x="620" y="185" width="150" height="44" rx="6" fill="#fff8f0" stroke="#e8d4b8" stroke-width="1" filter="url(#shadow)"/>
  <text x="695" y="206" text-anchor="middle" class="box-label">PFC</text>
  <text x="695" y="220" text-anchor="middle" class="box-sub">prefrontal cortex</text>

  <text x="695" y="260" text-anchor="middle" style="font-size:11px; font-weight:600; fill:#1a1a1a;">Meaning</text>
  <text x="695" y="275" text-anchor="middle" class="box-sub">Semantic content</text>
  <text x="695" y="288" text-anchor="middle" class="box-sub">Context, valence</text>

  <!-- Horizontal arrow: early → deep -->
  <line x1="80" y1="320" x2="770" y2="320" stroke="#ddd" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="80" y="338" class="dim" text-anchor="start">early vision</text>
  <text x="770" y="338" class="dim" text-anchor="end">higher cognition</text>
  <text x="425" y="338" class="dim" text-anchor="middle">processing hierarchy</text>

  <!-- Citation -->
  <line x1="30" y1="355" x2="870" y2="355" stroke="#f0f0f0" stroke-width="1"/>
  <text x="30" y="373" class="cite">Iigaya et al., Nature Communications, 2023 — Neural validation of the computational model</text>
  <text x="870" y="373" text-anchor="end" style="font-size:9px; fill:#888;">The model is not an approximation — it recapitulates the brain's architecture</text>
</svg>
</body>
</html>
