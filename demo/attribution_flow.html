<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { margin: 0; background: #fff; display: flex; justify-content: center; padding: 40px 20px; }
svg { font-family: -apple-system, 'Helvetica Neue', sans-serif; }
.title { font-size: 16px; font-weight: 600; fill: #1a1a1a; }
.subtitle { font-size: 11px; fill: #999; }
.layer-title { font-size: 11px; font-weight: 600; fill: #1a1a1a; }
.layer-sub { font-size: 9px; fill: #888; }
.layer-desc { font-size: 9px; fill: #aaa; font-style: italic; }
.pct { font-size: 20px; font-weight: 300; }
.note { font-size: 8.5px; fill: #bbb; font-style: italic; }
.box-label { font-size: 10px; font-weight: 500; fill: #1a1a1a; }
.box-sub { font-size: 8.5px; fill: #888; }
</style>
</head>
<body>
<svg width="820" height="580" viewBox="0 0 820 580">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="none" stroke="#ccc" stroke-width="1"/>
    </marker>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" class="title">When Art Sells — Who Gets Paid, and Why</text>
  <text x="410" y="48" text-anchor="middle" class="subtitle">Four layers of attribution, each measured differently</text>

  <!-- SALE -->
  <rect x="330" y="70" width="160" height="46" rx="8" fill="#fdf8ef" stroke="#e8d4a0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="410" y="90" text-anchor="middle" style="font-size:14px; font-weight:600; fill:#1a1a1a;">A painting sells</text>
  <text x="410" y="106" text-anchor="middle" class="layer-sub">revenue enters the attribution pool</text>

  <!-- Vertical line from sale -->
  <line x1="410" y1="116" x2="410" y2="150" stroke="#ddd" stroke-width="1"/>

  <!-- Four horizontal branches -->
  <line x1="100" y1="150" x2="720" y2="150" stroke="#eee" stroke-width="1"/>

  <!-- LAYER 1 -->
  <line x1="100" y1="150" x2="100" y2="175" stroke="#e8c4b8" stroke-width="1"/>
  <text x="100" y="140" text-anchor="middle" class="pct" fill="#c75a3a">~90%</text>
  <rect x="25" y="178" width="150" height="70" rx="6" fill="#fdf3f0" stroke="#e8c4b8" stroke-width="1" filter="url(#sh)"/>
  <text x="100" y="198" text-anchor="middle" class="layer-title">The Artist</text>
  <text x="100" y="213" text-anchor="middle" class="layer-sub">property right</text>
  <text x="100" y="238" text-anchor="middle" class="layer-desc">The artist made the work.</text>
  <text x="100" y="268" text-anchor="middle" class="note">Contractual, not computed.</text>

  <!-- LAYER 2 -->
  <line x1="310" y1="150" x2="310" y2="175" stroke="#c4b8e0" stroke-width="1"/>
  <text x="310" y="140" text-anchor="middle" class="pct" fill="#7c5cbf">~5–8%</text>
  <rect x="235" y="178" width="150" height="70" rx="6" fill="#f5f0fa" stroke="#c4b8e0" stroke-width="1" filter="url(#sh)"/>
  <text x="310" y="198" text-anchor="middle" class="layer-title">Manifold Shapers</text>
  <text x="310" y="213" text-anchor="middle" class="layer-sub">corpus-level Shapley</text>
  <text x="310" y="238" text-anchor="middle" class="layer-desc">Artists whose work defined</text>
  <text x="310" y="250" text-anchor="middle" class="layer-desc">this region of the embedding.</text>

  <!-- Corpus blocks under layer 2 -->
  <line x1="270" y1="248" x2="240" y2="310" stroke="#ddd" stroke-width="0.8"/>
  <line x1="310" y1="248" x2="310" y2="310" stroke="#ddd" stroke-width="0.8"/>
  <line x1="350" y1="248" x2="380" y2="310" stroke="#ddd" stroke-width="0.8"/>

  <rect x="195" y="312" width="90" height="32" rx="4" fill="#faf8fd" stroke="#ddd" stroke-width="0.8"/>
  <text x="240" y="332" text-anchor="middle" class="box-sub">Artist A corpus</text>

  <rect x="295" y="312" width="90" height="32" rx="4" fill="#faf8fd" stroke="#ddd" stroke-width="0.8"/>
  <text x="340" y="332" text-anchor="middle" class="box-sub">Artist B corpus</text>

  <rect x="345" y="348" width="90" height="32" rx="4" fill="#faf8fd" stroke="#ddd" stroke-width="0.8"/>
  <text x="390" y="368" text-anchor="middle" class="box-sub">Museum collection</text>

  <text x="310" y="400" text-anchor="middle" class="note">Small number of corpora per region</text>
  <text x="310" y="412" text-anchor="middle" class="note">→ exact Shapley is tractable</text>

  <!-- LAYER 3 -->
  <line x1="510" y1="150" x2="510" y2="175" stroke="#b8dcc8" stroke-width="1"/>
  <text x="510" y="140" text-anchor="middle" class="pct" fill="#3a8fb7">~1–2%</text>
  <rect x="435" y="178" width="150" height="70" rx="6" fill="#f0f7fb" stroke="#c4dfe9" stroke-width="1" filter="url(#sh)"/>
  <text x="510" y="198" text-anchor="middle" class="layer-title">Referral Path</text>
  <text x="510" y="213" text-anchor="middle" class="layer-sub">session tracking</text>
  <text x="510" y="238" text-anchor="middle" class="layer-desc">Which works led the</text>
  <text x="510" y="250" text-anchor="middle" class="layer-desc">buyer to this one.</text>

  <!-- LAYER 4 -->
  <line x1="710" y1="150" x2="710" y2="175" stroke="#b8dcc8" stroke-width="1"/>
  <text x="710" y="140" text-anchor="middle" class="pct" fill="#4a9e6e">pool</text>
  <rect x="635" y="178" width="150" height="70" rx="6" fill="#f0f9f4" stroke="#b8dcc8" stroke-width="1" filter="url(#sh)"/>
  <text x="710" y="198" text-anchor="middle" class="layer-title">Infrastructure</text>
  <text x="710" y="213" text-anchor="middle" class="layer-sub">aggregate A/B testing</text>
  <text x="710" y="238" text-anchor="middle" class="layer-desc">Algorithm, governance.</text>
  <text x="710" y="250" text-anchor="middle" class="layer-desc">Measured over time, not per sale.</text>

  <!-- THE FACTORING -->
  <rect x="60" y="440" width="300" height="76" rx="8" fill="#fff" stroke="#e8d4a0" stroke-width="1" stroke-dasharray="5,3" filter="url(#sh)"/>
  <text x="210" y="462" text-anchor="middle" style="font-size:11px; font-weight:600; fill:#c9963a;">The Factoring</text>
  <text x="210" y="481" text-anchor="middle" style="font-size:10px; fill:#555;">Δ  =  how much did the model change?</text>
  <text x="210" y="498" text-anchor="middle" style="font-size:10px; fill:#555;">ω  =  was that change valuable?</text>
  <text x="210" y="530" text-anchor="middle" class="note">Compute Δ once (objective). Apply ω per stakeholder (governance choice).</text>

  <!-- LEDGER -->
  <rect x="480" y="456" width="260" height="44" rx="6" fill="#fafafa" stroke="#ddd" stroke-width="1" filter="url(#sh)"/>
  <text x="610" y="476" text-anchor="middle" class="box-label">Filix Ledger</text>
  <text x="610" y="491" text-anchor="middle" class="box-sub">cryptographic audit trail for every layer</text>

  <!-- Dotted lines to ledger -->
  <line x1="100" y1="248" x2="520" y2="460" stroke="#ddd" stroke-width="0.5" stroke-dasharray="3,4"/>
  <line x1="310" y1="248" x2="560" y2="460" stroke="#ddd" stroke-width="0.5" stroke-dasharray="3,4"/>
  <line x1="510" y1="248" x2="610" y2="456" stroke="#ddd" stroke-width="0.5" stroke-dasharray="3,4"/>
  <line x1="710" y1="248" x2="680" y2="456" stroke="#ddd" stroke-width="0.5" stroke-dasharray="3,4"/>
</svg>
</body>
</html>
