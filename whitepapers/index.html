<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whitepapers — Rasa</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --black: #1a1a1a;
  --white: #faf9f6;
  --pool: #2fa8cc;
  --pool-light: #d4f1f9;
  --pool-pale: #edf8fc;
  --line: #111;
  --border: #d4d0c8;
  --muted: #6b6b6b;
  --link: #1a6b8a;
  --code-bg: #f5f4ee;
  --sans: 'Space Grotesk', system-ui, sans-serif;
  --serif: 'Crimson Pro', Georgia, serif;
  --mono: 'IBM Plex Mono', monospace;
  --display: 'Instrument Serif', Georgia, serif;
  --sidebar-w: 280px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 17px; }
body { font-family: var(--serif); color: var(--black); background: var(--white); display: flex; min-height: 100vh; }

/* Sidebar */
nav {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--pool-pale);
  border-right: 3px solid var(--line);
  padding: 2rem 1.25rem;
  position: fixed; top: 0; left: 0; height: 100vh;
  overflow-y: auto; z-index: 10;
}
nav .back {
  display: inline-block;
  font-family: var(--mono); font-size: 0.65rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); text-decoration: none;
  margin-bottom: 1.25rem;
}
nav .back:hover { color: var(--pool); }
nav h1 {
  font-family: var(--display); font-size: 1.4rem;
  font-weight: 400; margin-bottom: 0.25rem;
}
nav .subtitle {
  font-family: var(--mono); font-size: 0.7rem;
  color: var(--muted); margin-bottom: 1.5rem;
  letter-spacing: 0.04em;
}
nav .accent-bar {
  height: 4px; background: var(--pool);
  margin-bottom: 1.5rem; border-radius: 2px;
}
nav ol { list-style: none; }
nav ol li { margin-bottom: 0.15rem; }
nav ol li a {
  display: block; padding: 0.45rem 0.6rem;
  font-family: var(--sans); font-size: 0.82rem; font-weight: 500;
  color: var(--black); text-decoration: none;
  border-radius: 4px; line-height: 1.35;
  transition: background 0.15s;
}
nav ol li a:hover { background: rgba(47,168,204,0.12); }
nav ol li a.active { background: var(--pool); color: #fff; }
nav .nav-footer {
  margin-top: 2rem; padding-top: 1rem;
  border-top: 1px solid var(--border);
  font-family: var(--mono); font-size: 0.7rem;
  color: var(--muted); line-height: 1.6;
}
nav .nav-footer a { color: var(--link); text-decoration: none; }

/* Content */
main {
  margin-left: var(--sidebar-w); flex: 1;
  max-width: 52rem; padding: 3rem 3.5rem 6rem;
}
main h1 {
  font-family: var(--display); font-size: 2.2rem;
  font-weight: 400; margin-bottom: 0.5rem;
  line-height: 1.15; color: var(--black);
}
main h2 {
  font-family: var(--sans); font-size: 1.25rem;
  font-weight: 600; margin-top: 2.5rem;
  margin-bottom: 0.75rem; line-height: 1.3;
}
main h3 {
  font-family: var(--sans); font-size: 1.05rem;
  font-weight: 600; margin-top: 2rem; margin-bottom: 0.5rem;
}
main p { margin-bottom: 1rem; line-height: 1.75; font-weight: 300; }
main strong { font-weight: 600; }
main ul, main ol { margin-bottom: 1rem; padding-left: 1.5rem; }
main li { margin-bottom: 0.35rem; line-height: 1.65; font-weight: 300; }
main blockquote {
  border-left: 4px solid var(--pool); padding: 0.75rem 1.25rem;
  margin: 1.25rem 0; background: var(--pool-pale);
}
main blockquote p { margin-bottom: 0.5rem; }
main blockquote p:last-child { margin-bottom: 0; }
main code {
  font-family: var(--mono); font-size: 0.85em;
  background: var(--code-bg); padding: 0.15em 0.35em;
  border-radius: 3px;
}
main pre {
  background: var(--code-bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 1rem 1.25rem;
  overflow-x: auto; margin-bottom: 1.25rem; line-height: 1.5;
}
main pre code { background: none; padding: 0; font-size: 0.82rem; }
main a { color: var(--link); }
main table { border-collapse: collapse; width: 100%; margin-bottom: 1.25rem; font-size: 0.9rem; }
main th, main td {
  border: 1px solid var(--border); padding: 0.5rem 0.75rem;
  text-align: left; line-height: 1.5;
}
main th { background: var(--code-bg); font-family: var(--sans); font-weight: 600; font-size: 0.82rem; }
main hr { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }
main .paper-nav {
  display: flex; justify-content: space-between;
  margin-top: 3rem; padding-top: 1.5rem;
  border-top: 3px solid var(--line); font-size: 0.85rem;
}
main .paper-nav a { color: var(--link); text-decoration: none; font-family: var(--sans); font-weight: 500; }
main .paper-nav a:hover { color: var(--pool); }
.katex-display { margin: 1.25rem 0; overflow-x: auto; }

@media print {
  nav { display: none; }
  main { margin-left: 0; max-width: 100%; padding: 1rem; }
  main .paper-nav { display: none; }
}
@media (max-width: 800px) {
  nav { position: static; width: 100%; min-width: 0; height: auto; border-right: none; border-bottom: 3px solid var(--line); padding: 1rem; }
  main { margin-left: 0; padding: 1.5rem; }
}
</style>
</head>
<body>

<nav>
  <a class="back" href="../">&larr; Rasa</a>
  <h1>Whitepapers</h1>
  <div class="subtitle">Research foundations</div>
  <div class="accent-bar"></div>
  <ol id="toc"></ol>
  <div class="nav-footer">
    <a href="#" onclick="printCurrent(); return false;">Print current</a><br>
    Zachary F. Mainen<br>
    Zachary F. Mainen, 2026
  </div>
</nav>

<main id="content">
  <p style="color:var(--muted); margin-top: 4rem; text-align:center; font-family: var(--sans);">Select a paper from the sidebar.</p>
</main>

<script>
const papers = [
  { file: 'papers/01-attribution-whitepaper.md', title: 'Value Attribution in Agentic Systems', subtitle: 'Shapley, Ledgers, and the Contribution of Code', key: '1' },
  { file: 'papers/02-practical-systems-survey.md', title: 'Practical Value Attribution Systems', subtitle: 'Industry survey', key: '2' },
  { file: 'papers/03-shapley-literature-survey.md', title: 'Shapley Values for Data Valuation', subtitle: 'Literature survey', key: '3' },
];

const toc = document.getElementById('toc');
const content = document.getElementById('content');
let currentIdx = -1;

papers.forEach((p, i) => {
  const li = document.createElement('li');
  const a = document.createElement('a');
  a.href = '#' + p.key;
  a.innerHTML = p.title + '<br><span style="font-size:0.7rem;color:var(--muted);font-weight:300;">' + p.subtitle + '</span>';
  a.dataset.idx = i;
  a.onclick = (e) => { e.preventDefault(); loadPaper(i); };
  li.appendChild(a);
  toc.appendChild(li);
});

function renderMath(html) {
  html = html.replace(/\$\$([\s\S]*?)\$\$/g, (_, tex) => {
    try { return katex.renderToString(tex.trim(), { displayMode: true }); } catch(e) { return '$$' + tex + '$$'; }
  });
  html = html.replace(/(?<!\$)\$(?!\$)([^\n$]+?)\$(?!\$)/g, (_, tex) => {
    try { return katex.renderToString(tex.trim(), { displayMode: false }); } catch(e) { return '$' + tex + '$'; }
  });
  return html;
}

function slugify(text) {
  return text.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
}

function addAnchors(html) {
  return html.replace(/<(h[1-4])>(.*?)<\/\1>/g, (m, tag, text) => {
    const id = slugify(text.replace(/<[^>]+>/g, ''));
    return `<${tag} id="${id}">${text}</${tag}>`;
  });
}

async function loadPaper(idx, scrollTo) {
  currentIdx = idx;
  const p = papers[idx];
  toc.querySelectorAll('a').forEach(a => a.classList.toggle('active', parseInt(a.dataset.idx) === idx));
  try {
    const resp = await fetch(p.file);
    if (!resp.ok) { content.innerHTML = `<h1>${p.title}</h1><p style="color:var(--muted);">Not yet available.</p>`; return; }
    const md = await resp.text();
    let html = marked.parse(md);
    html = renderMath(html);
    html = addAnchors(html);
    const prev = idx > 0 ? `<a href="#" onclick="loadPaper(${idx-1}); return false;">&larr; ${papers[idx-1].title}</a>` : '<span></span>';
    const next = idx < papers.length - 1 ? `<a href="#" onclick="loadPaper(${idx+1}); return false;">${papers[idx+1].title} &rarr;</a>` : '<span></span>';
    html += `<div class="paper-nav">${prev}${next}</div>`;
    content.innerHTML = html;
    if (scrollTo) { const el = document.getElementById(scrollTo); if (el) { el.scrollIntoView({ behavior: 'smooth' }); return; } }
    window.scrollTo(0, 0);
    history.pushState(null, '', '#' + p.key);
  } catch(e) { content.innerHTML = `<h1>${p.title}</h1><p style="color:var(--muted);">Error loading.</p>`; }
}

function printCurrent() { if (currentIdx >= 0) window.print(); }

content.addEventListener('click', (e) => {
  const a = e.target.closest('a');
  if (!a) return;
  const href = a.getAttribute('href');
  if (!href || !href.startsWith('#')) return;
  const parts = href.slice(1).split('/');
  const key = parts[0];
  const idx = papers.findIndex(p => p.key === key);
  if (idx >= 0) { e.preventDefault(); loadPaper(idx, parts[1]); }
});

function navigateFromHash() {
  const h = window.location.hash.slice(1);
  if (!h) return;
  const parts = h.split('/');
  const idx = papers.findIndex(p => p.key === parts[0]);
  if (idx >= 0 && idx !== currentIdx) loadPaper(idx, parts[1]);
}
navigateFromHash();
window.addEventListener('hashchange', navigateFromHash);
</script>
</body>
</html>
